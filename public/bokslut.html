<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokslut 2024–2025 — MLC Workspace</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  :root {
    --bg: #fdfaf0;
    --card: #ffffff;
    --border: #e8dca0;
    --border-light: #ece5c8;
    --text: #3d3425;
    --text-secondary: #7a6d5a;
    --gold: #c4a02a;
    --gold-light: rgba(196,160,42,0.12);
    --gold-hover: #a8881e;
    --gold-bg: #fffdf5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--gold-bg);
  }

  .header-logo {
    width: 36px;
    height: 36px;
    aspect-ratio: 1/1;
    object-fit: contain;
  }

  .header-back {
    text-decoration: none;
    color: var(--gold);
    font-size: 14px;
    font-weight: 600;
    margin-left: auto;
    transition: color 0.15s;
  }

  .header-back:hover { color: var(--gold-hover); }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* CONTAINER */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 2px solid var(--border);
  }

  .tab {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    background: none;
    font-family: inherit;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* TODO LIST */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    transition: all 0.15s;
  }

  .todo-item:hover {
    border-color: var(--gold);
    box-shadow: 0 2px 10px rgba(180,160,60,0.1);
  }

  .todo-item.dragging {
    opacity: 0.4;
    transform: scale(0.98);
  }

  .todo-item.drag-over {
    border-color: var(--gold);
    background: var(--gold-bg);
  }

  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--text-secondary);
  }

  .todo-drag {
    color: #c4b87a;
    cursor: grab;
    font-size: 16px;
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
    margin-top: 2px;
  }

  .todo-checkbox {
    width: 22px;
    height: 22px;
    min-height: 22px;
    border-radius: 6px;
    border: 2px solid var(--gold);
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .todo-checkbox.checked {
    background: var(--gold);
  }

  .todo-checkbox.checked::after {
    content: '';
    width: 6px;
    height: 11px;
    border: solid #fff;
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
    margin-top: -2px;
  }

  .todo-text {
    flex: 1;
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
    border: none;
    background: transparent;
    font-family: inherit;
    outline: none;
    width: 100%;
    resize: none;
    overflow: hidden;
    padding: 0;
    min-height: 22px;
  }

  .todo-text:focus {
    background: var(--gold-bg);
    border-radius: 4px;
    padding: 2px 4px;
    margin: -2px -4px;
  }

  .todo-deadline {
    font-size: 11px;
    color: #9a7a1a;
    background: var(--gold-light);
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 600;
  }

  .todo-delete {
    color: #c4b87a;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
    font-family: inherit;
  }

  .todo-delete:hover { color: #c46a6a; }

  .add-todo {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .add-todo input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border-light);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-todo input:focus { border-color: var(--gold); }

  .add-todo button {
    padding: 12px 22px;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .add-todo button:hover { background: var(--gold-hover); }

  /* SUMMARY */
  .summary-content {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 24px;
    min-height: 300px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    outline: none;
    font-family: inherit;
  }

  .summary-content:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(196,160,42,0.1);
  }

  /* SAVE INDICATOR */
  .save-indicator {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 10px;
    text-align: right;
    min-height: 18px;
  }

  /* PROGRESS BAR */
  .progress-bar {
    margin-bottom: 28px;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 8px;
    background: var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-secondary);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .header { flex-wrap: wrap; }
    .header-back { margin-left: 0; width: 100%; margin-top: 8px; }
    .container { padding: 28px 16px 60px; }
    .todo-deadline { display: none; }
    .tab { padding: 10px 16px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="/mlc-logo.png" alt="MLC">
  <div>
    <h1>Bokslut 2024–2025</h1>
    <p>MLC Nest AB — Räkenskapsår 2024-10-30 till 2025-11-30</p>
  </div>
  <a class="header-back" href="/">&larr; Tillbaka till Workspace</a>
</div>

<div class="container">

  <div class="progress-bar">
    <div class="progress-label">
      <span>Framsteg</span>
      <span id="progress-text">0 av 0 klara</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="todos">Att göra</button>
    <button class="tab" data-tab="summary">Sammanfattning</button>
  </div>

  <div id="panel-todos" class="panel active">
    <ul class="todo-list" id="todo-list"></ul>
    <div class="add-todo">
      <input type="text" id="new-todo" placeholder="Lägg till uppgift...">
      <button id="add-todo-btn">Lägg till</button>
    </div>
    <div class="save-indicator" id="todo-save-status"></div>
  </div>

  <div id="panel-summary" class="panel">
    <div class="summary-content" contenteditable="true" id="summary-content"></div>
    <div class="save-indicator" id="summary-save-status"></div>
  </div>

</div>

<footer>
  MLC Nest AB &mdash; Nordens mest empatiska och skalbara byrå
</footer>

<script>
(function() {
  const SUPABASE_URL = 'https://dxixbtxywsvshthtiwgo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4aXhidHh5d3N2c2h0aHRpd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjE1MzgsImV4cCI6MjA4ODIzNzUzOH0.87q-gad0BtcRcYHKpsKNqoJ8wTo-8jLPUizGomLboB4';

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  // --- TABS ---
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // --- TODOS ---
  let todos = [];
  const todoList = document.getElementById('todo-list');
  const newTodoInput = document.getElementById('new-todo');

  async function fetchTodos() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/bokslut_todos?order=sort_order.asc', { headers });
    todos = await res.json();
    renderTodos();
    updateProgress();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function renderTodos() {
    todoList.innerHTML = '';
    todos.forEach((todo, idx) => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.completed ? ' completed' : '');
      li.draggable = true;
      li.dataset.id = todo.id;
      li.dataset.idx = idx;

      li.innerHTML =
        '<span class="todo-drag">&#8942;&#8942;</span>' +
        '<div class="todo-checkbox' + (todo.completed ? ' checked' : '') + '"></div>' +
        '<textarea class="todo-text" rows="1">' + escapeHtml(todo.text) + '</textarea>' +
        (todo.deadline ? '<span class="todo-deadline">' + escapeHtml(todo.deadline) + '</span>' : '') +
        '<button class="todo-delete" title="Ta bort">&times;</button>';

      li.querySelector('.todo-checkbox').addEventListener('click', () => toggleTodo(todo.id, !todo.completed));

      const textInput = li.querySelector('.todo-text');
      let editTimer;
      textInput.addEventListener('input', () => {
        autoResize(textInput);
        clearTimeout(editTimer);
        editTimer = setTimeout(() => updateTodoText(todo.id, textInput.value), 800);
      });

      li.querySelector('.todo-delete').addEventListener('click', () => deleteTodo(todo.id));

      // Drag
      li.addEventListener('dragstart', handleDragStart);
      li.addEventListener('dragover', handleDragOver);
      li.addEventListener('dragleave', handleDragLeave);
      li.addEventListener('drop', handleDrop);
      li.addEventListener('dragend', handleDragEnd);

      todoList.appendChild(li);
    });
    // Auto-resize all textareas after they are in the DOM
    todoList.querySelectorAll('.todo-text').forEach(autoResize);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateProgress() {
    const done = todos.filter(t => t.completed).length;
    const total = todos.length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-text').textContent = done + ' av ' + total + ' klara';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  async function toggleTodo(id, completed) {
    await fetch(SUPABASE_URL + '/rest/v1/bokslut_todos?id=eq.' + id, {
      method: 'PATCH', headers,
      body: JSON.stringify({ completed, updated_at: new Date().toISOString() })
    });
    showSave('todo-save-status');
    fetchTodos();
  }

  async function updateTodoText(id, text) {
    await fetch(SUPABASE_URL + '/rest/v1/bokslut_todos?id=eq.' + id, {
      method: 'PATCH', headers,
      body: JSON.stringify({ text, updated_at: new Date().toISOString() })
    });
    showSave('todo-save-status');
  }

  async function deleteTodo(id) {
    await fetch(SUPABASE_URL + '/rest/v1/bokslut_todos?id=eq.' + id, {
      method: 'DELETE', headers
    });
    showSave('todo-save-status');
    fetchTodos();
  }

  document.getElementById('add-todo-btn').addEventListener('click', addTodo);
  newTodoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  async function addTodo() {
    const text = newTodoInput.value.trim();
    if (!text) return;
    const maxOrder = todos.length > 0 ? Math.max(...todos.map(t => t.sort_order)) + 1 : 1;
    await fetch(SUPABASE_URL + '/rest/v1/bokslut_todos', {
      method: 'POST', headers,
      body: JSON.stringify({ text, sort_order: maxOrder })
    });
    newTodoInput.value = '';
    showSave('todo-save-status');
    fetchTodos();
  }

  // --- DRAG AND DROP ---
  let dragIdx = null;

  function handleDragStart(e) {
    dragIdx = +this.dataset.idx;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }

  function handleDragLeave() {
    this.classList.remove('drag-over');
  }

  function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    const dropIdx = +this.dataset.idx;
    if (dragIdx === null || dragIdx === dropIdx) return;
    const moved = todos.splice(dragIdx, 1)[0];
    todos.splice(dropIdx, 0, moved);
    const updates = todos.map((t, i) =>
      fetch(SUPABASE_URL + '/rest/v1/bokslut_todos?id=eq.' + t.id, {
        method: 'PATCH', headers,
        body: JSON.stringify({ sort_order: i + 1 })
      })
    );
    Promise.all(updates).then(() => {
      showSave('todo-save-status');
      fetchTodos();
    });
  }

  function handleDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  }

  // --- SUMMARY ---
  const summaryEl = document.getElementById('summary-content');

  async function fetchSummary() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/bokslut_summary?order=id.asc&limit=1', { headers });
    const data = await res.json();
    if (data.length > 0) {
      summaryEl.textContent = data[0].content;
    }
  }

  let summaryTimer;
  summaryEl.addEventListener('input', () => {
    clearTimeout(summaryTimer);
    summaryTimer = setTimeout(saveSummary, 1000);
  });

  async function saveSummary() {
    const content = summaryEl.textContent;
    await fetch(SUPABASE_URL + '/rest/v1/bokslut_summary?id=eq.1', {
      method: 'PATCH', headers,
      body: JSON.stringify({ content, updated_at: new Date().toISOString() })
    });
    showSave('summary-save-status');
  }

  function showSave(elementId) {
    const el = document.getElementById(elementId);
    el.textContent = 'Sparat';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }

  // --- INIT ---
  fetchTodos();
  fetchSummary();
})();
</script>

</body>
</html>
