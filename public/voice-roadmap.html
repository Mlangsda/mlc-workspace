<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Röstassistent — Roadmap · MLC</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  :root {
    --bg: #faf6f0;
    --card: #ffffff;
    --card-hover: #fffcf5;
    --border: #e8dcc8;
    --text: #3d3425;
    --text-secondary: #7a6d5a;
    --accent: #c49a4a;
    --accent-hover: #b38a3a;
    --status-todo: #b8a27a;
    --status-doing: #c49a4a;
    --status-done: #5cb87a;
    --input-bg: #fdf9f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    margin-bottom: 32px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    transition: color 0.15s;
  }

  .back-link:hover { color: var(--accent); }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .logo {
    width: 40px;
    height: 40px;
    aspect-ratio: 1/1;
    object-fit: contain;
  }

  header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--text-secondary);
    font-size: 15px;
    max-width: 680px;
  }

  .loader, .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }

  .phases {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .phase {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(61,52,37,0.05);
    transition: border-color 0.15s;
  }

  .phase:hover { border-color: #d9c8a4; }

  .phase-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 10px;
  }

  .phase-title-wrap { flex: 1; }

  .phase-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .phase-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-top: 2px;
  }

  .phase-description {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .status-select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .status-select.todo { color: var(--status-todo); }
  .status-select.doing { color: var(--status-doing); background: rgba(196,154,74,0.08); }
  .status-select.done { color: var(--status-done); background: rgba(92,184,122,0.08); }

  .comments {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .comments-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .comment {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
  }

  .comment input[type="checkbox"] {
    margin-top: 3px;
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .comment.done .comment-body {
    text-decoration: line-through;
    color: var(--text-secondary);
  }

  .comment-body {
    flex: 1;
    line-height: 1.5;
    word-break: break-word;
  }

  .comment-kind {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(196,154,74,0.15);
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .comment-kind.comment {
    background: rgba(122,109,90,0.15);
    color: var(--text-secondary);
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .comment:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #d45050; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .add-row input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }

  .add-row input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--card);
  }

  .add-row select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }

  .add-row button {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .add-row button:hover { background: var(--accent-hover); }
  .add-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  footer {
    text-align: center;
    padding: 40px 20px 0;
    color: var(--text-secondary);
    font-size: 12px;
  }

  @media (max-width: 700px) {
    .container { padding: 24px 14px 60px; }
    header h1 { font-size: 24px; }
    .phase { padding: 18px; }
    .phase-title { font-size: 17px; }
    .add-row input { min-width: 140px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a class="back-link" href="/">← Tillbaka till Workspace</a>
    <div class="header-top">
      <img class="logo" src="/favicon.png" alt="MLC">
      <h1>Röstassistent — Roadmap</h1>
    </div>
    <p>Bygget av "MLC Röst" (Sofie) i fyra etapper. Klicka på status för att ändra, lägg till kommentarer eller önskefunktioner per etapp. Allt sparas direkt i Supabase.</p>
  </header>

  <div id="content" class="loader">Laddar…</div>

  <footer>MLC Nest AB — Nordens mest empatiska och skalbara byrå</footer>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.46.1';

const SUPABASE_URL = 'https://dxixbtxywsvshthtiwgo.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4aXhidHh5d3N2c2h0aHRpd2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjE1MzgsImV4cCI6MjA4ODIzNzUzOH0.87q-gad0BtcRcYHKpsKNqoJ8wTo-8jLPUizGomLboB4';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

const contentEl = document.getElementById('content');

const STATUS_LABEL = { todo: 'To Do', doing: 'Pågår', done: 'Klar' };

async function loadAll() {
  const [{ data: phases, error: e1 }, { data: comments, error: e2 }] = await Promise.all([
    supabase.from('voice_roadmap_phases').select('*').order('sort_order'),
    supabase.from('voice_roadmap_comments').select('*').order('created_at')
  ]);

  if (e1 || e2) {
    contentEl.innerHTML = `<div class="empty">Kunde inte ladda: ${(e1 || e2).message}</div>`;
    return;
  }

  const grouped = {};
  for (const p of phases) grouped[p.id] = [];
  for (const c of comments) if (grouped[c.phase_id]) grouped[c.phase_id].push(c);

  render(phases, grouped);
}

function render(phases, grouped) {
  contentEl.className = 'phases';
  contentEl.innerHTML = phases.map(p => phaseCard(p, grouped[p.id] || [])).join('');
  attachHandlers();
}

function phaseCard(phase, comments) {
  const commentsHtml = comments.length
    ? comments.map(commentRow).join('')
    : '<div style="color:var(--text-secondary);font-size:13px;padding:6px 4px;">Inga kommentarer än. Lägg till nedan.</div>';

  return `
    <div class="phase" data-phase-id="${phase.id}">
      <div class="phase-header">
        <div class="phase-title-wrap">
          <div class="phase-num">Etapp ${phase.phase_number}</div>
          <h2 class="phase-title">${escapeHtml(phase.title)}</h2>
        </div>
        <select class="status-select ${phase.status}" data-action="status" data-id="${phase.id}">
          <option value="todo" ${phase.status === 'todo' ? 'selected' : ''}>${STATUS_LABEL.todo}</option>
          <option value="doing" ${phase.status === 'doing' ? 'selected' : ''}>${STATUS_LABEL.doing}</option>
          <option value="done" ${phase.status === 'done' ? 'selected' : ''}>${STATUS_LABEL.done}</option>
        </select>
      </div>
      <p class="phase-description">${escapeHtml(phase.description || '')}</p>
      <div class="comments">
        <div class="comments-title">Kommentarer & önskade funktioner</div>
        ${commentsHtml}
        <div class="add-row">
          <select data-action="kind" data-phase="${phase.id}">
            <option value="comment">Kommentar</option>
            <option value="feature">Önskad funktion</option>
          </select>
          <input type="text" placeholder="Skriv och tryck Enter…" data-action="input" data-phase="${phase.id}">
          <button data-action="add" data-phase="${phase.id}">Lägg till</button>
        </div>
      </div>
    </div>`;
}

function commentRow(c) {
  return `
    <div class="comment ${c.done ? 'done' : ''}" data-comment-id="${c.id}">
      <input type="checkbox" data-action="toggle-done" data-id="${c.id}" ${c.done ? 'checked' : ''}>
      <span class="comment-kind ${c.kind}">${c.kind === 'feature' ? 'Funktion' : 'Kommentar'}</span>
      <span class="comment-body">${escapeHtml(c.body)}</span>
      <button class="delete-btn" data-action="delete" data-id="${c.id}" title="Ta bort">×</button>
    </div>`;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function attachHandlers() {
  contentEl.querySelectorAll('[data-action="status"]').forEach(el => {
    el.addEventListener('change', async e => {
      const status = e.target.value;
      e.target.className = 'status-select ' + status;
      const { error } = await supabase.from('voice_roadmap_phases')
        .update({ status, updated_at: new Date().toISOString() })
        .eq('id', e.target.dataset.id);
      if (error) alert('Kunde inte spara: ' + error.message);
    });
  });

  contentEl.querySelectorAll('[data-action="toggle-done"]').forEach(el => {
    el.addEventListener('change', async e => {
      const done = e.target.checked;
      e.target.closest('.comment').classList.toggle('done', done);
      const { error } = await supabase.from('voice_roadmap_comments').update({ done }).eq('id', e.target.dataset.id);
      if (error) alert('Kunde inte spara: ' + error.message);
    });
  });

  contentEl.querySelectorAll('[data-action="delete"]').forEach(el => {
    el.addEventListener('click', async e => {
      if (!confirm('Ta bort?')) return;
      const { error } = await supabase.from('voice_roadmap_comments').delete().eq('id', e.target.dataset.id);
      if (error) return alert('Kunde inte ta bort: ' + error.message);
      loadAll();
    });
  });

  contentEl.querySelectorAll('[data-action="input"]').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const btn = contentEl.querySelector(`[data-action="add"][data-phase="${e.target.dataset.phase}"]`);
        btn.click();
      }
    });
  });

  contentEl.querySelectorAll('[data-action="add"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const phaseId = btn.dataset.phase;
      const input = contentEl.querySelector(`[data-action="input"][data-phase="${phaseId}"]`);
      const kindSel = contentEl.querySelector(`[data-action="kind"][data-phase="${phaseId}"]`);
      const body = input.value.trim();
      if (!body) return;
      btn.disabled = true;
      const { error } = await supabase.from('voice_roadmap_comments').insert([{
        phase_id: phaseId,
        kind: kindSel.value,
        body
      }]);
      btn.disabled = false;
      if (error) return alert('Kunde inte spara: ' + error.message);
      input.value = '';
      loadAll();
    });
  });
}

loadAll();
</script>
</body>
</html>
